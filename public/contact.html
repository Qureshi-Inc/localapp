<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary Meta Tags -->
    <title>Contact Us - AI Dev</title>
    <meta name="description" content="Get in touch with the AI Dev team for support, inquiries, or feedback.">
    <meta name="keywords" content="contact, support, ai dev, github, qwen, deepseek">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ai-dev.dev/contact.html">
    <meta property="og:title" content="Contact Us - AI Dev">
    <meta property="og:description" content="Get in touch with the AI Dev team for support, inquiries, or feedback.">
    <meta property="og:image" content="https://ai-dev.dev/ai-dev-preview.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://ai-dev.dev/contact.html">
    <meta property="twitter:title" content="Contact Us - AI Dev">
    <meta property="twitter:description" content="Get in touch with the AI Dev team for support, inquiries, or feedback.">
    <meta property="twitter:image" content="https://ai-dev.dev/ai-dev-preview.png">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://ai-dev.dev/contact.html">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00d4ff;
            --secondary: #7b2cbf;
            --accent: #00ff88;
            --dark: #0a0e1a;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark);
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--primary), transparent);
            top: -200px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--secondary), transparent);
            bottom: -150px;
            right: -100px;
            animation-delay: -7s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent), transparent);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -50px) scale(1.1); }
            50% { transform: translate(-30px, 30px) scale(0.95); }
            75% { transform: translate(-50px, -20px) scale(1.05); }
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(20px);
            background: rgba(10, 14, 26, 0.8);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-link {
            color: #a0a0a0;
            text-decoration: none;
            font-size: 0.95rem;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-link:hover {
            color: #fff;
        }

        .nav-link:hover::after {
            width: 80%;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .hero-content {
            max-width: 900px;
        }

        /* Contact Section */
        section#contact {
            padding: 8rem 2rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact-container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 3rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .contact-title {
            font-size: clamp(2.5rem, 6vw, 4rem);
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            color: #fff;
            font-size: 1.1rem;
        }

        input, textarea {
            padding: 1rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.25rem 2.5rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.4);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 4rem 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
        }

        .footer-link {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            color: #fff;
            text-decoration: none;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .footer-link:hover {
            background: var(--primary);
            transform: translateY(-3px);
        }

        /* Mobile-first responsive design */
        @media (max-width: 768px) {
            nav { padding: 1rem; }
            .nav-links {
                gap: 0.5rem;
                position: fixed;
                top: 70px;
                left: -100%;
                width: 100%;
                background: rgba(10, 14, 26, 0.98);
                flex-direction: column;
                align-items: center;
                padding: 3rem 0;
                transition: left 0.3s ease;
            }
            .nav-links.active { left: 0; }
            .nav-link { 
                padding: 1rem 2rem; 
                font-size: 1.1rem; 
                width: 80%;
                text-align: center;
            }
            .mobile-menu-btn { display: flex; }

            section#contact {
                padding: 4rem 1rem;
            }

            .contact-container {
                padding: 2rem 1.5rem;
            }

            h1 { font-size: 2rem; }
        }

        @media (max-width: 480px) {
            .section-title {
                font-size: 2rem;
            }
            
            .contact-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>
        <div class="grid-overlay"></div>

        <!-- Navigation -->
        <nav>
            <div class="logo">🤖 AI Dev</div>
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()" id="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="/#features" class="nav-link">Features</a></li>
                <li><a href="/#demo" class="nav-link">Demo</a></li>
                <li><a href="/#stats" class="nav-link">Benefits</a></li>
                <li><a href="/#testimonials" class="nav-link">Testimonials</a></li>
                <li><a href="/#faq" class="nav-link">FAQ</a></li>
                <li><a href="/contact.html" class="nav-link active">Contact</a></li>
            </ul>
        </nav>

        <!-- Contact Section -->
    <section id="contact">
        <div class="contact-container">
            <h2 class="contact-title">Get In Touch</h2>
            <form class="contact-form" action="#" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required aria-required="true">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required aria-required="true">
                </div>
                
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required aria-required="true">
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Your message here..." required aria-required="true"></textarea>
                </div>
                
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p style="color: #808080; margin-bottom: 2rem;">Built with ❤️ for the future of autonomous development</p>
        <a href="https://github.com/Qureshi-Inc/ai-dev" target="_blank" class="footer-link">🐙 Visit GitHub Repository</a>
    </footer>

    <script>
        // Mobile menu toggle
        function toggleMobileMenu() {
            const navLinks = document.querySelector('.nav-links');
            const btn = document.getElementById('mobile-menu-btn');
            navLinks.classList.toggle('active');
            btn.classList.toggle('active');
        }

        // Smooth scroll for nav links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });

        // Form submission handling
        document.querySelector('.contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // In a real implementation, this would send the form data to a server
            alert('Thank you for your message! This is a demo page - no actual form submission occurs.');
            
            // Reset form
            this.reset();
        });
    </script>
</body>
</html>
